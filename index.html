<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Akan Name Generator</title>
</head>
<body>

    <h1>Find Your Akan Name</h1>
    
    <form id="akanForm">
        <!-- Birthday Inputs -->
        <label for="day">Day:</label>
        <input type="number" id="day" placeholder="DD" required>

        <label for="month">Month:</label>
        <input type="number" id="month" placeholder="MM" required>

        <label for="year">Year:</label>
        <input type="number" id="year" placeholder="YYYY" required>

        <br><br>

        <!-- Gender Selection -->
        <label>Gender:</label>
        <input type="radio" name="gender" value="male" id="male" required> Male
        <input type="radio" name="gender" value="female" id="female"> Female

        <br><br>

        <button type="submit">Generate Name</button>
    </form>

    <!-- This is where the result will show up -->
    <h2 id="result"></h2>

    <script src="script.js"></script>
</body>
</html>
