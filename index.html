<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Akan Name Generator</title>
</head>
<body>

    <h2>Akan Name Generator</h2>
    <p>Enter your birth details to find your Ghanaian name!</p>

    <!-- The Form -->
    <form>
        <!-- Date Inputs -->
        <div>
            <label>Day of Birth:</label><br>
            <input type="number" id="day" placeholder="e.g. 15">
        </div>
        <br>

        <div>
            <label>Month of Birth:</label><br>
            <input type="number" id="month" placeholder="e.g. 12">
        </div>
        <br>

        <div>
            <label>Year of Birth:</label><br>
            <input type="number" id="year" placeholder="e.g. 1998">
        </div>
        <br>

        <!-- Gender Selection -->
        <div>
            <label>Gender:</label><br>
            <input type="radio" name="gender" id="male"> Male
            <input type="radio" name="gender" id="female"> Female
        </div>
        <br>

        <!-- The Button -->
        <!-- "onclick" tells the HTML to run our JavaScript function -->
        <button type="button" onclick="getAkanName()">Find My Name</button>
    </form>

    <!-- This is where the result will appear -->
    <h3 id="result" style="color: blue;"></h3>

    <script src="script.js"></script>
</body>
</html>
